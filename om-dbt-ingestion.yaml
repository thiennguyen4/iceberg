source:
  type: dbt
  serviceName: iceberg-hive-catalog
  sourceConfig:
    config:
      type: DBT
      dbtConfigSource:
        dbtSecurityConfig: {}
        dbtPrefixConfig:
          dbtCatalogFilePath: /opt/dbt/dbt_iceberg/target/catalog.json
          dbtManifestFilePath: /opt/dbt/dbt_iceberg/target/manifest.json
          dbtRunResultsFilePath: /opt/dbt/dbt_iceberg/target/run_results.json
      dbtUpdateDescriptions: true
      includeTags: true
      dbtClassificationName: dbt_tags
      databaseServiceNames:
        - iceberg-hive-catalog
sink:
  type: metadata-rest
  config: {}
workflowConfig:
  loggerLevel: INFO
  openMetadataServerConfig:
    hostPort: http://openmetadata:8585/api
    authProvider: no-auth

