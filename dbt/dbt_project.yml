name: nessie_transform
version: "1.0.0"
config-version: 2

profile: hive_spark

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  nessie_transform:
    staging:
      +materialized: table
      +file_format: iceberg
      +schema: dbt_staging
    mart:
      +materialized: table
      +file_format: iceberg
      +schema: dbt_mart
      +table_properties:
        write.format.default: parquet
        write.parquet.compression-codec: zstd
