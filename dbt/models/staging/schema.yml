version: 2

models:
  - name: stg_orders
    description: "Cleaned and type-cast orders from Nessie raw source"
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - not_null
      - name: amount
        data_tests:
          - not_null
      - name: status
        data_tests:
          - accepted_values:
              values: ["completed", "pending", "cancelled"]

