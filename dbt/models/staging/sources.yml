version: 2

sources:
  - name: hive_raw
    description: "Raw data tables stored in Hive Iceberg catalog (s3://warehouse/)"
    schema: sales
    tables:
      - name: orders
        description: "Raw orders ingested by Spark into Hive catalog"
        columns:
          - name: order_id
            description: "Unique order identifier"
            data_tests:
              - not_null
              - unique
          - name: customer_id
            description: "Customer identifier"
            data_tests:
              - not_null
          - name: order_time
            description: "Timestamp when order was placed"
          - name: amount
            description: "Order total amount in decimal"
          - name: status
            description: "Order status: completed | pending | cancelled"
          - name: created_at
            description: "Record creation timestamp"



