version: 2

models:
  - name: mart_daily_revenue
    description: "Daily revenue aggregation from all orders (price * quantity per day)"
    columns:
      - name: order_date
        description: "Business date"
        data_tests:
          - not_null
          - unique
      - name: total_orders
        description: "Count of distinct orders per day"
        data_tests:
          - not_null
      - name: unique_customers
        description: "Distinct customers per day"
      - name: total_revenue
        description: "Sum of (price * quantity) per day"
        data_tests:
          - not_null
      - name: avg_order_value
        description: "Average (price * quantity) per day"
      - name: min_order_value
        description: "Minimum (price * quantity)"
      - name: max_order_value
        description: "Maximum (price * quantity)"
      - name: updated_at
        description: "Last transformation timestamp"
